        #sha256sum * > sha256sums.txt
        #echo "<center><h1>x86_64 虚拟机平台镜像</h1></center>" > README.md

    #- name: Upload artifacts
      #uses: actions/upload-artifact@v4
      #with:
        #name: ${{ env.build_date }}-${{ matrix.model }}-${{ matrix.tag.version }}
        #path: ${{ env.build_dir }}/rom/*.*
        
    #- name: 上传Releases固件发布
